<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700&display=swap');
 
 :root {
    --bg-color: #0d0d14;
    --panel-bg: #14141f;
    --text-main: #e0e0f0;
    --text-dim: #888;
    --border-color: rgba(255,255,255,0.08);
    --accent: #ff9800;
    --output-bg: #0a0a12;
  }

  body.light-theme {
    --bg-color: #f0f2f5;
    --panel-bg: #ffffff;
    --text-main: #1a1a1a;
    --text-dim: #666;
    --border-color: rgba(0,0,0,0.1);
    --accent: #e65100;
    --output-bg: #f5f5f5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-color);
    color: var(--text-main);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 16px;
  }

  h1 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #ff9800;
    margin-bottom: 16px;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 16px;
    max-width: 900px;
  }

  .panel {
    background: var(--panel-bg);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 14px;
    transition: background 0.3s, border 0.3s;
  }

  /* Header & Theme Toggle */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 900px;
    margin-bottom: 16px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #ff9800;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,152,0,0.2);
  }
  .theme-toggle {
    background: var(--panel-bg);
    border: 1px solid var(--border-color);
    color: var(--text-main);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,152,0,0.2);
  }

  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .row label {
    font-size: 11px;
    color: var(--text-dim);
    width: 90px;
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }

  input[type=range] {
    flex: 1;
    accent-color: #ff9800;
    height: 3px;
  }

  input[type=color] {
    width: 32px;
    height: 24px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    background: none;
    cursor: pointer;
    padding: 2px;
  }

  .val {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    width: 38px;
    text-align: right;
    flex-shrink: 0;
  }

  .sep { height: 1px; background: var(--border-color); margin: 12px 0; }

  /* STOPS */
  .stops-wrap { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .stop-row { display: flex; align-items: center; gap: 6px; }
  .stop-row input[type=range] { flex: 1; }
  .stop-del {
    background: none; border: 1px solid var(--border-color);
    border-radius: 4px; color: var(--text-dim); cursor: pointer;
    font-size: 11px; padding: 2px 6px;
  }
  .stop-del:hover { color: #e53935; border-color: #e53935; }

  .add-stop {
    background: none;
    border: 1px dashed var(--accent);
    border-radius: 6px;
    color: var(--accent);
    font-size: 11px;
    padding: 5px;
    width: 100%;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
  }
  .add-stop:hover { background: rgba(255,152,0,0.06); }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
  .tab {
    padding: 5px 12px; border-radius: 6px 6px 0 0;
    font-size: 11px; cursor: pointer; border: 1px solid transparent;
    border-bottom: none; color: var(--text-dim); background: transparent;
    font-family: 'Syne', sans-serif; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .tab.active { background: var(--bg-color); color: var(--accent); border-color: var(--border-color); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Preview */
  .preview-wrap {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .preview-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #888; margin-bottom: 6px; }

  .tile-preview {
    width: 120px;
    height: 120px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    position: relative;
    overflow: hidden;
    margin: 0 auto;
    transition: all 0.2s;
  }

  .tile-icon { font-size: 28px; }
  .tile-name { font-size: 12px; font-weight: 700; color: white; letter-spacing: 1px; }
  .tile-val { font-size: 11px; color: rgba(255,255,255,0.7); font-family: 'JetBrains Mono', monospace; }

  /* Output */
  .output-box {
    background: var(--output-bg);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    word-break: break-all;
    line-height: 1.5;
    min-height: 40px;
  }

  .copy-btn {
    width: 100%;
    padding: 8px;
    background: linear-gradient(135deg, #ff9800, #e65100);
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .copy-btn:hover { opacity: 0.85; }
  .copy-btn.copied { background: #43a047; }

  .toggle-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .toggle-row label { font-size: 11px; color: #888; font-family: 'JetBrains Mono', monospace; }
  input[type=checkbox] { accent-color: #ff9800; width: 14px; height: 14px; }

  select {
    background: var(--bg-color);
    border: 1px solid var(--border-color);
    border-radius: 4px;
    color: var(--text-main);
    font-size: 11px;
    padding: 4px 6px;
    font-family: 'JetBrains Mono', monospace;
    flex: 1;
  }
</style>
</head>
<body>
<div class="header">
<h1>Tile CSS Builder</h1>
 <button class="theme-toggle" id="theme-toggle">Mode: Dark</button></div>
<div class="layout">
  <!-- LEFT: Editor -->
  <div class="panel">
    <div class="tabs">
      <div class="tab active" data-tab="gradient">Gradient</div>
      <div class="tab" data-tab="shadow">Box Shadow</div>
    </div>

    <!-- GRADIENT TAB -->
    <div class="tab-panel active" id="tab-gradient">
      <div class="section-label">Gradient Settings</div>

      <div class="row">
        <label>Type</label>
        <select id="grad-type">
          <option value="linear">linear-gradient</option>
          <option value="radial">radial-gradient</option>
        </select>
      </div>

      <div id="angle-row" class="row">
        <label>Angle</label>
        <input type="range" id="grad-angle" min="0" max="360" value="135">
        <span class="val" id="angle-val">135°</span>
      </div>

      <div class="sep"></div>
      <div class="section-label">Color Stops</div>
      <div class="stops-wrap" id="stops-wrap"></div>
      <button class="add-stop" id="add-stop">+ Add stop</button>
    </div>

    <!-- SHADOW TAB -->
    <div class="tab-panel" id="tab-shadow">
      <div class="section-label">Box Shadow</div>

      <div class="toggle-row">
        <input type="checkbox" id="shadow-inset">
        <label>inset</label>
      </div>

      <div class="row">
        <label>Offset X</label>
        <input type="range" id="sh-x" min="-40" max="40" value="0">
        <span class="val" id="shx-val">0px</span>
      </div>
      <div class="row">
        <label>Offset Y</label>
        <input type="range" id="sh-y" min="-40" max="40" value="4">
        <span class="val" id="shy-val">4px</span>
      </div>
      <div class="row">
        <label>Blur</label>
        <input type="range" id="sh-blur" min="0" max="60" value="14">
        <span class="val" id="shblur-val">14px</span>
      </div>
      <div class="row">
        <label>Spread</label>
        <input type="range" id="sh-spread" min="-20" max="20" value="0">
        <span class="val" id="shspread-val">0px</span>
      </div>
      <div class="row">
        <label>Color</label>
        <input type="color" id="sh-color" value="#000000">
        <input type="range" id="sh-alpha" min="0" max="100" value="40">
        <span class="val" id="shalpha-val">0.40</span>
      </div>
    </div>
  </div>

  <!-- RIGHT: Preview + Output -->
  <div class="panel preview-wrap">
    <div class="section-label">Live Preview</div>

    <div>
      <div class="preview-label">Tile</div>
      <div class="tile-preview" id="tile-preview">
        <div class="tile-icon">💡</div>
        <div class="tile-name">Living Room</div>
        <div class="tile-val">22.4°C</div>
      </div>
    </div>

    <div class="sep"></div>
    <div class="section-label">CSS Output</div>
    <div class="output-box" id="css-output">—</div>
    <button class="copy-btn" id="copy-btn">📋 Copy CSS</button>
  </div>
</div>

<script>
  // State
  let stops = [
    { color: '#1a1a2e', alpha: 100, pos: 0 },
    { color: '#ff9800', alpha: 30, pos: 100 },
  ];

  // Theme Toggle Logic
  const themeBtn = document.getElementById('theme-toggle');
  themeBtn.addEventListener('click', () => {
    document.body.classList.toggle('light-theme');
    const isLight = document.body.classList.contains('light-theme');
    themeBtn.textContent = isLight ? 'Mode: Light' : 'Mode: Dark';
  });

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r}, ${g}, ${b}, ${(alpha/100).toFixed(2)})`;
  }

  function buildGradient() {
    const type = document.getElementById('grad-type').value;
    const angle = document.getElementById('grad-angle').value;
    const stopsStr = stops.map(s => `${hexToRgba(s.color, s.alpha)} ${s.pos}%`).join(', ');
    if (type === 'linear') return `linear-gradient(${angle}deg, ${stopsStr})`;
    return `radial-gradient(circle, ${stopsStr})`;
  }

  function buildShadow() {
    const inset = document.getElementById('shadow-inset').checked ? 'inset ' : '';
    const x = document.getElementById('sh-x').value;
    const y = document.getElementById('sh-y').value;
    const blur = document.getElementById('sh-blur').value;
    const spread = document.getElementById('sh-spread').value;
    const col = document.getElementById('sh-color').value;
    const alpha = document.getElementById('sh-alpha').value;
    return `${inset}${x}px ${y}px ${blur}px ${spread}px ${hexToRgba(col, alpha)}`;
  }

  function getActiveTab() {
    return document.querySelector('.tab.active').dataset.tab;
  }

  function update() {
    const tab = getActiveTab();
    let css = '';
    if (tab === 'gradient') {
      css = buildGradient();
      document.getElementById('tile-preview').style.background = css;
      document.getElementById('tile-preview').style.boxShadow = '';
    } else {
      css = buildShadow();
      document.getElementById('tile-preview').style.boxShadow = css;
      document.getElementById('tile-preview').style.background = 'rgba(255,255,255,0.08)';
    }
    document.getElementById('css-output').textContent = css;
  }

  function renderStops() {
    const wrap = document.getElementById('stops-wrap');
    wrap.innerHTML = '';
    stops.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'stop-row';
      div.innerHTML = `
        <input type="color" class="stop-color" data-i="${i}" value="${s.color}">
        <input type="range" class="stop-alpha" data-i="${i}" min="0" max="100" value="${s.alpha}" title="Opacity">
        <span class="val">${Math.round(s.alpha)}%</span>
        <input type="range" class="stop-pos" data-i="${i}" min="0" max="100" value="${s.pos}" title="Position">
        <span class="val">${s.pos}%</span>
        ${stops.length > 2 ? `<button class="stop-del" data-i="${i}">✕</button>` : ''}
      `;
      wrap.appendChild(div);
    });

    wrap.querySelectorAll('.stop-color').forEach(el => el.addEventListener('input', e => {
      stops[e.target.dataset.i].color = e.target.value; update();
    }));
    wrap.querySelectorAll('.stop-alpha').forEach(el => el.addEventListener('input', e => {
      stops[e.target.dataset.i].alpha = parseInt(e.target.value);
      e.target.nextElementSibling.textContent = Math.round(e.target.value) + '%';
      update();
    }));
    wrap.querySelectorAll('.stop-pos').forEach(el => el.addEventListener('input', e => {
      stops[e.target.dataset.i].pos = parseInt(e.target.value);
      e.target.nextElementSibling.textContent = e.target.value + '%';
      update();
    }));
    wrap.querySelectorAll('.stop-del').forEach(el => el.addEventListener('click', e => {
      stops.splice(parseInt(e.target.dataset.i), 1);
      renderStops(); update();
    }));
  }

  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      update();
    });
  });

  // Angle
  document.getElementById('grad-angle').addEventListener('input', e => {
    document.getElementById('angle-val').textContent = e.target.value + '°';
    update();
  });

  // Gradient type
  document.getElementById('grad-type').addEventListener('change', e => {
    document.getElementById('angle-row').style.display = e.target.value === 'linear' ? 'flex' : 'none';
    update();
  });

  // Add stop
  document.getElementById('add-stop').addEventListener('click', () => {
    stops.push({ color: '#ffffff', alpha: 20, pos: 50 });
    renderStops(); update();
  });

  // Shadow sliders
  ['sh-x','sh-y','sh-blur','sh-spread'].forEach(id => {
    document.getElementById(id).addEventListener('input', e => {
      document.getElementById(id.replace('sh-','sh') + '-val').textContent = e.target.value + 'px';
      update();
    });
  });
  document.getElementById('sh-alpha').addEventListener('input', e => {
    document.getElementById('shalpha-val').textContent = (e.target.value/100).toFixed(2);
    update();
  });
  document.getElementById('sh-color').addEventListener('input', update);
  document.getElementById('shadow-inset').addEventListener('change', update);

  // Fix shadow val ids
  document.getElementById('sh-x').addEventListener('input', e => { document.getElementById('shx-val').textContent = e.target.value+'px'; });
  document.getElementById('sh-y').addEventListener('input', e => { document.getElementById('shy-val').textContent = e.target.value+'px'; });
  document.getElementById('sh-blur').addEventListener('input', e => { document.getElementById('shblur-val').textContent = e.target.value+'px'; });
  document.getElementById('sh-spread').addEventListener('input', e => { document.getElementById('shspread-val').textContent = e.target.value+'px'; });

  // Copy
  document.getElementById('copy-btn').addEventListener('click', () => {
    const txt = document.getElementById('css-output').textContent;
    navigator.clipboard.writeText(txt).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✅ Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 Copy CSS'; btn.classList.remove('copied'); }, 1500);
    });
  });

  // Init
  renderStops();
  update();
</script>
</body>
</html>
